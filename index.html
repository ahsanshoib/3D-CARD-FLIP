<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D CARD FLIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="h-screen flex items-center justify-center bg-white-100">
  <div class="group perspective-1000 w-64 h-80">
    <div class="relative w-full h-full transition-transform duration-500 transform-style-3d group-hover:rotate-y-180">
      <div class="absolute w-full h-full bg-blue-600 text-white flex items-center justify-center rounded-xl backface-hidden">FRONT</div>
      <div class="absolute w-full h-full bg-orange-400 text-white flex items-center justify-center rounded-xl backface-hidden rotate-y-180">BACK</div>
    </div>
  </div>
</div>
<style>.perspective-1000 { perspective: 1000px; } .transform-style-3d { transform-style: preserve-3d; } .backface-hidden { backface-visibility: hidden; } .rotate-y-180 { transform: rotateY(180deg); }</style>
</body>
</html>
